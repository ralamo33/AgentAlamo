<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Todo App</title>
  <style>
    body { font-family: system-ui, sans-serif; padding: 40px; max-width: 600px; }
    h1 { font-size: 1.2em; margin-bottom: 16px; }
    ul { list-style: disc; padding-left: 20px; }
    li { padding: 4px 0; font-size: 14px; }
    button { margin-top: 12px; padding: 6px 12px; }
  </style>
</head>
<body>
  <h1>Todo List</h1>
  <ul>
    <li>Buy groceries</li>
    <li>Walk the dog</li>
    <li>Write quarterly report</li>
    <li>Schedule dentist appointment</li>
    <li>Review pull requests</li>
  </ul>
  <button>Add Task</button>
</body>
</html>
