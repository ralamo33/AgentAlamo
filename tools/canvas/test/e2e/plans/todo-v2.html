<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Todo App</title>
  <style>
    body { font-family: system-ui, sans-serif; padding: 40px; max-width: 600px; background: #f0fdf4; }
    h1 { font-size: 2.2em; font-weight: 800; color: #166534; margin-bottom: 24px; }
    .task-list { display: flex; flex-direction: column; gap: 8px; }
    .task {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 16px; background: #fff; border-radius: 8px;
      border: 1px solid #dcfce7; font-size: 15px;
    }
    .task input[type="checkbox"] { width: 18px; height: 18px; accent-color: #22c55e; }
    .task.done { color: #9ca3af; text-decoration: line-through; }
    .add-btn {
      margin-top: 16px; padding: 10px 20px;
      background: #22c55e; color: #fff; border: none;
      border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>Todo List</h1>
  <div class="task-list">
    <div class="task"><input type="checkbox"> Buy groceries</div>
    <div class="task"><input type="checkbox"> Walk the dog</div>
    <div class="task done"><input type="checkbox" checked> Write quarterly report</div>
    <div class="task"><input type="checkbox"> Schedule dentist appointment</div>
    <div class="task"><input type="checkbox"> Review pull requests</div>
  </div>
  <button class="add-btn">+ Add Task</button>
</body>
</html>
